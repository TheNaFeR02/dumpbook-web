services:
  server:
    image: ghcr.io/thenafer02/dumpbook-web/server:latest
    expose:
      - "1234"
    volumes:
      - hocuspocus-data:/app/data
    restart: unless-stopped

  web:
    image: ghcr.io/thenafer02/dumpbook-web/web:latest
    expose:
      - "3000"
    depends_on:
      - server
    environment:
      - NEXT_PUBLIC_HOCUSPOCUS_URL=wss://dumpbook.ink/ws
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - server
    restart: unless-stopped

volumes:
  hocuspocus-data: