services:
  server:
    image: ghcr.io/thenafer02/dumpbook-web/server:latest
    env_file:
      - .env.production
    expose:
      - "1234"
    volumes:
      - hocuspocus-data:/app/data
    restart: unless-stopped

  web:
    image: ghcr.io/thenafer02/dumpbook-web/web:latest
    env_file:
      - .env.production
    expose:
      - "3000"
    depends_on:
      - server
    volumes:
      - web-data:/app/data
    restart: unless-stopped
    
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - server
    restart: unless-stopped

volumes:
  hocuspocus-data:
  web-data: