
name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate schema SQL
        env:
          NEXT_PUBLIC_HOCUSPOCUS_URL: ws://localhost:1234
          BETTER_AUTH_SECRET: ci-placeholder
          BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          POLAR_ACCESS_TOKEN: ci-placeholder
          POLAR_PRODUCT_ID: ci-placeholder
          POLAR_WEBHOOK_SECRET: ci-placeholder
          HOCUSPOCUS_SECRET: ci-placeholder
        run: |
          cd apps/web
          NODE_PATH=../../node_modules pnpm dlx auth@latest generate --output /tmp/schema.sql
          echo "SCHEMA_B64=$(base64 -w 0 /tmp/schema.sql)" >> $GITHUB_ENV

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/server:latest

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/web:latest
          build-args: |
            NEXT_PUBLIC_HOCUSPOCUS_URL=wss://dumpbook.ink/ws

      - name: Write env file to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cat > ~/dumpbook-web/.env.production << 'EOF'
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=https://dumpbook.ink
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            POLAR_ACCESS_TOKEN=${{ secrets.POLAR_ACCESS_TOKEN }}
            POLAR_PRODUCT_ID=${{ secrets.POLAR_PRODUCT_ID }}
            POLAR_WEBHOOK_SECRET=${{ secrets.POLAR_WEBHOOK_SECRET }}
            HOCUSPOCUS_SECRET=${{ secrets.HOCUSPOCUS_SECRET }}
            EOF

      - name: Migrate database
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if ! command -v sqlite3 &>/dev/null; then
              apt-get install -y sqlite3
            fi
            mkdir -p /var/lib/docker/volumes/dumpbook-web_web-data/_data
            echo "${{ env.SCHEMA_B64 }}" | base64 -d | \
              sqlite3 /var/lib/docker/volumes/dumpbook-web_web-data/_data/auth.sqlite

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/dumpbook-web
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
